<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Hisaab Pro</title>
  <meta name="theme-color" content="#0a0a14" />
  <style>
    :root { --p:#8b7cff; --a:#ff7ac6; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { min-height:100vh; display:grid; place-items:center; padding:24px;
      font-family:'Inter',system-ui,-apple-system,sans-serif; color:#e8e8f2;
      background:radial-gradient(120% 120% at 50% 0%, #14142a 0%, #0a0a14 55%); }
    .card { max-width:440px; text-align:center; }
    .logo { width:72px; height:72px; margin:0 auto 24px; display:grid; place-items:center;
      border-radius:20px; background:linear-gradient(135deg, rgba(139,124,255,.18), rgba(255,122,198,.18));
      border:1px solid rgba(139,124,255,.4); }
    h1 { font-family:'Space Grotesk',sans-serif; font-size:1.6rem; margin-bottom:10px; }
    p { color:#9a9ab0; line-height:1.6; margin-bottom:28px; }
    .pulse { width:10px; height:10px; border-radius:50%; background:#f5c451; display:inline-block;
      margin-right:8px; box-shadow:0 0 0 0 rgba(245,196,81,.5); animation:pulse 1.8s infinite; vertical-align:middle; }
    @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(245,196,81,.5)} 70%{box-shadow:0 0 0 12px rgba(245,196,81,0)} 100%{box-shadow:0 0 0 0 rgba(245,196,81,0)} }
    .btn { display:inline-flex; align-items:center; gap:8px; height:46px; padding:0 24px; border:none; cursor:pointer;
      border-radius:12px; font-weight:600; font-size:.95rem; color:#fff;
      background:linear-gradient(135deg,var(--p),var(--a)); box-shadow:0 12px 32px rgba(139,124,255,.35); }
    small { display:block; margin-top:24px; color:#6a6a80; font-size:.8rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg width="40" height="40" viewBox="0 0 48 48" fill="none">
        <path d="M16 32V16M16 24h10M26 16v16" stroke="url(#g)" stroke-width="3.2" stroke-linecap="round"/>
        <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#8b7cff"/><stop offset="1" stop-color="#ff7ac6"/></linearGradient></defs>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p><span class="pulse"></span>Hisaab Pro can't reach the network right now. Your saved data is safe — reconnect to pick up where you left off.</p>
    <a class="btn" href="./index.html">Try again</a>
    <small>Hisaab Pro — works offline once installed.</small>
  </div>
</body>
</html>
